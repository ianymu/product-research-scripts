<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>小红书笔记预览</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'PingFang SC', sans-serif; background: #f5f5f5; }
.phone-frame { max-width: 375px; margin: 0 auto; background: white; min-height: 100vh; }
.xhs-header { background: #ff2442; color: white; padding: 12px 16px; font-size: 14px; text-align: center; font-weight: bold; }
.xhs-images { width: 100%; }
.xhs-images img { width: 100%; display: block; }
.xhs-body { padding: 16px; }
.xhs-title { font-size: 18px; font-weight: bold; margin-bottom: 12px; line-height: 1.4; }
.xhs-content { font-size: 15px; line-height: 2; color: #333; white-space: pre-wrap; }
.xhs-tags { margin-top: 16px; }
.xhs-tag { display: inline-block; background: #fff0f0; color: #ff2442; padding: 4px 12px; border-radius: 14px; font-size: 12px; margin: 4px 4px 4px 0; }
.xhs-engagement { display: flex; justify-content: space-around; padding: 16px; border-top: 1px solid #f0f0f0; margin-top: 16px; }
.xhs-btn { text-align: center; color: #999; font-size: 12px; }
.xhs-btn .icon { font-size: 20px; }
.copy-btn { position: fixed; bottom: 20px; right: 20px; background: #ff2442; color: white; border: none; padding: 12px 24px; border-radius: 24px; font-size: 14px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2); z-index: 100; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="xhs-header">小红书</div>
  <div class="xhs-images" id="images"></div>
  <div class="xhs-body">
    <div class="xhs-title" id="title">加载中...</div>
    <div class="xhs-content" id="content">加载中...</div>
    <div class="xhs-tags" id="tags"></div>
  </div>
  <div class="xhs-engagement">
    <div class="xhs-btn"><div class="icon">❤️</div>点赞</div>
    <div class="xhs-btn"><div class="icon">⭐</div>收藏</div>
    <div class="xhs-btn"><div class="icon">💬</div>评论</div>
    <div class="xhs-btn"><div class="icon">↗️</div>分享</div>
  </div>
</div>
<button class="copy-btn" onclick="copyContent()">复制文案</button>
<script>
const draftId = window.location.pathname.split('/').pop();
fetch(`/api/draft/${draftId}`).then(r => r.json()).then(data => {
  const d = data.draft;
  if (!d) { document.getElementById('content').textContent = '草稿不存在'; return; }
  document.getElementById('title').textContent = d.title || '';
  // Extract images from markdown
  const imgRegex = /!\[([^\]]*)\]\(([^)]+)\)/g;
  let match, images = [];
  let text = d.content || '';
  while ((match = imgRegex.exec(text)) !== null) { images.push(match[2]); }
  text = text.replace(imgRegex, '').trim();
  document.getElementById('content').textContent = text;
  if (images.length) {
    document.getElementById('images').innerHTML = images.map(u => `<img src="${u}">`).join('');
  }
  // Extract hashtags
  const tags = text.match(/#[^\s#]+/g) || [];
  document.getElementById('tags').innerHTML = tags.map(t => `<span class="xhs-tag">${t}</span>`).join('');
}).catch(e => { document.getElementById('content').textContent = '加载失败'; });

function copyContent() {
  const text = document.getElementById('title').textContent + '\n\n' + document.getElementById('content').textContent;
  navigator.clipboard.writeText(text).then(() => alert('已复制')).catch(() => alert('复制失败'));
}
</script>
</body>
</html>
