<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>微信文章预览</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'PingFang SC', 'Hiragino Sans GB', sans-serif; background: #ededed; }
.phone-frame { max-width: 375px; margin: 0 auto; background: white; min-height: 100vh; }
.wx-header { background: #07c160; color: white; padding: 12px 16px; font-size: 14px; text-align: center; }
.wx-meta { padding: 16px; border-bottom: 1px solid #f0f0f0; }
.wx-title { font-size: 20px; font-weight: bold; line-height: 1.4; margin-bottom: 8px; }
.wx-author { font-size: 12px; color: #999; }
.wx-content { padding: 16px; font-size: 16px; line-height: 1.8; color: #333; }
.wx-content img { width: 100%; border-radius: 4px; margin: 12px 0; }
.wx-content h2 { font-size: 18px; color: #333; margin: 20px 0 12px; padding-left: 12px; border-left: 3px solid #e74c3c; }
.wx-content blockquote { background: #f8f8f8; border-left: 3px solid #ddd; padding: 12px; margin: 12px 0; font-size: 14px; color: #666; }
.wx-content p { margin-bottom: 12px; }
.copy-btn { position: fixed; bottom: 20px; right: 20px; background: #07c160; color: white; border: none; padding: 12px 24px; border-radius: 24px; font-size: 14px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2); z-index: 100; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="wx-header">微信公众号</div>
  <div class="wx-meta">
    <div class="wx-title" id="title">加载中...</div>
    <div class="wx-author" id="author">Ian's OPC</div>
  </div>
  <div class="wx-content" id="content">加载中...</div>
</div>
<button class="copy-btn" onclick="copyContent()">复制全文</button>
<script>
const draftId = window.location.pathname.split('/').pop();
fetch(`/api/draft/${draftId}`).then(r => r.json()).then(data => {
  const d = data.draft;
  if (!d) { document.getElementById('content').textContent = '草稿不存在'; return; }
  document.getElementById('title').textContent = d.title || '无标题';
  // Simple markdown to HTML
  let html = (d.content || '').replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
    .replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
  document.getElementById('content').innerHTML = '<p>' + html + '</p>';
}).catch(e => { document.getElementById('content').textContent = '加载失败: ' + e; });

function copyContent() {
  const text = document.getElementById('content').innerText;
  navigator.clipboard.writeText(text).then(() => alert('已复制')).catch(() => {
    const ta = document.createElement('textarea'); ta.value = text;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); alert('已复制');
  });
}
</script>
</body>
</html>
